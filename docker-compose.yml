services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: poll
      POSTGRES_USER: poll
      POSTGRES_PASSWORD: poll
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poll"]
      interval: 5s
      retries: 5

  api:
    build: ./poll-api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: poll
      DB_PASSWORD: poll
      DB_DATABASE: poll
      TZ: Indian/Reunion
    ports:
      - "3333:3333"
    volumes:
      - ./poll-api:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  front:
    build: ./poll-front
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3333
    ports:
      - "5173:5173"
    volumes:
      - ./poll-front:/app
      - /app/node_modules

volumes:
  pgdata: